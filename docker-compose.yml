services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: electris-net
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Map the host port (left) to the container port (right)
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=$(NODE_ENV)
      - PORT=${PORT}
      - ADAPTER=${ADAPTER}
      
      # For SvelteKit CSRF protection, set this to your public domain
      # e.g. https://electris.net
      - ORIGIN=${ORIGIN:-http://localhost:3000}
      
      # YouTube Data API Key
      - YOUTUBE_DATA_API_V3_KEY=${YOUTUBE_DATA_API_V3_KEY}
      
      # Optional: Trust proxy headers if behind a reverse proxy (Nginx, Traefik, etc.)
      # - PROTOCOL_HEADER=x-forwarded-proto
      # - HOST_HEADER=x-forwarded-host
    networks:
      - electris-network
    volumes:
      # Map specific static subdirectories for real-time updates
      # This allows you to update blog posts and add fonts or media without rebuilding
      - ./static/data/blog:/app/build/client/data/blog:ro
      - ./static/fonts:/app/build/client/fonts:ro
      - ./static/media:/app/build/client/media:ro
      # Optional: if you want the generated index to update in real-time, 
      # ensure you update the index file on your host.
      - ./static/data/blog/index.json:/app/build/client/data/blog/index.json:ro

networks:
  electris-network:
    driver: bridge
